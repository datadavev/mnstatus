<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DataONE Member Nodes</title>
        <!--
        Note: Portions of this page were generated using Gemini AI. All generated code
        reviewed and adjusted where appropriate.
        -->

        <link
            href="https://cdn.jsdelivr.net/npm/cesium@1.141.0/Build/Cesium/Widgets/widgets.css"
            rel="stylesheet"
        />

        <style>
            html,
            body,
            #cesiumContainer {
                margin: 0;
                padding: 0;
                height: 100%;
                width: 100%;
                overflow: hidden;
                background-color: #000;
            }
            /* Hover tooltip overlay */
            #customTooltip {
                position: absolute;
                display: none;
                background: rgba(42, 42, 42, 0.95);
                color: white;
                padding: 6px 10px;
                border-radius: 4px;
                font-family: Arial, sans-serif;
                font-size: 13px;
                pointer-events: none;
                z-index: 1000;
                border: 1px solid #666;
                box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.5);
            }
        </style>
    </head>
    <body>
        <div id="cesiumContainer"></div>
        <div id="customTooltip"></div>

        <!-- Include CesiumJS 1.141 library core -->
        <script src="https://cdn.jsdelivr.net/npm/cesium@1.141.0/Build/Cesium/Cesium.js"></script>

        <script>
            // 1. Initialize the 3D Viewer
            const viewer = new Cesium.Viewer("cesiumContainer", {
                animation: false,
                timeline: false,
                baseLayerPicker: true,
                fullscreenButton: false,
                geocoder: false,
                homeButton: false,
            });

            // Ensure proper horizon occlusion
            viewer.scene.globe.depthTestAgainstTerrain = true;

            const geojsonUrl =
                "https://raw.githubusercontent.com/datadavev/mnstatus/refs/heads/main/data/nodes.geojson";
            const tooltipEl = document.getElementById("customTooltip");

            const stickLength = 50000; //length of stick connecting the balls, m

            // 2. Load the GeoJSON file
            Cesium.GeoJsonDataSource.load(geojsonUrl)
                .then(function (dataSource) {
                    viewer.dataSources.add(dataSource);

                    const entities = dataSource.entities.values;

                    entities.forEach((entity) => {
                        const properties = entity.properties;
                        const state = properties.state
                            ? properties.state.getValue().toLowerCase()
                            : "";

                        // --- SPATIAL COORDINATE COMPUTATION ---
                        // Get the standard 2D Cartesian coordinate position generated by the GeoJSON parser
                        const currentPosition = entity.position.getValue(
                            Cesium.JulianDate.now(),
                        );

                        // Convert Cartesian back to Cartographic (Radians/Altitude) to manipulate the height value
                        const cartographic =
                            Cesium.Cartographic.fromCartesian(currentPosition);

                        // Establish the baseline ground point (0 meters elevation)
                        const groundCartesian = Cesium.Cartesian3.fromRadians(
                            cartographic.longitude,
                            cartographic.latitude,
                            0,
                        );

                        // Establish the floating ball target point (500 meters elevation)
                        const raisedCartesian = Cesium.Cartesian3.fromRadians(
                            cartographic.longitude,
                            cartographic.latitude,
                            stickLength,
                        );

                        // Re-assign the primary center of the entity to the floating ball coordinate height
                        entity.position = new Cesium.ConstantPositionProperty(
                            raisedCartesian,
                        );

                        // --- CONDITIONAL COLOR SELECTION ---
                        const themeColor =
                            state === "down"
                                ? Cesium.Color.fromCssColorString("#888888")
                                : Cesium.Color.fromCssColorString("#0078ff");

                        // --- THE BALL FEATURE ---
                        entity.point = new Cesium.PointGraphics({
                            pixelSize: 10, // Made slightly bigger for visual balance as a ball
                            color: themeColor,
                            outlineColor: Cesium.Color.WHITE,
                            outlineWidth: 1.5,
                        });

                        // --- THE STICK FEATURE ---
                        // Attach a vertical polyline mapping from ground directly up to the stickLength floating point
                        entity.polyline = new Cesium.PolylineGraphics({
                            positions: [groundCartesian, raisedCartesian],
                            width: 2,
                            material: themeColor.withAlpha(0.6), // Slightly semi-transparent stem look
                            arcType: Cesium.ArcType.NONE, // Forces line to draw completely straight up vertically
                        });

                        // Clear default billboard icons
                        entity.billboard = undefined;

                        // --- GENERATE DATA DESCRIPTIONS (CLICK SIDEBAR) ---
                        let infoTable =
                            '<table style="color:white; font-family:sans-serif; font-size:12px; border-collapse:collapse; width:100%;">';
                        const propertyNames = properties.propertyNames;
                        propertyNames.forEach((prop) => {
                            const val = properties[prop].getValue();
                            infoTable += `<tr style="border-bottom: 1px solid #444;"><td style="font-weight:bold; padding: 4px 10px 4px 0;">${prop}:</td><td style="padding: 4px 0;">${val}</td></tr>`;
                        });
                        infoTable += "</table>";
                        entity.description = infoTable;
                    });

                    // Smoothly ease camera to data points cluster bounding frame
                    viewer.zoomTo(dataSource);

                    // --- 3D CANVAS SCREEN INTERACTION HANDLER ---
                    const handler = new Cesium.ScreenSpaceEventHandler(
                        viewer.scene.canvas,
                    );

                    handler.setInputAction(function (movement) {
                        // Raycast target point selection under mouse trajectory
                        const pickedObject = viewer.scene.pick(
                            movement.endPosition,
                        );

                        if (Cesium.defined(pickedObject) && pickedObject.id) {
                            const entity = pickedObject.id;
                            const properties = entity.properties;

                            if (properties && properties.name) {
                                tooltipEl.style.display = "block";
                                tooltipEl.style.left =
                                    movement.endPosition.x + 15 + "px";
                                tooltipEl.style.top =
                                    movement.endPosition.y - 15 + "px";
                                tooltipEl.innerText =
                                    properties.name.getValue();

                                viewer.scene.canvas.style.cursor = "pointer";
                                return;
                            }
                        }

                        tooltipEl.style.display = "none";
                        viewer.scene.canvas.style.cursor = "default";
                    }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
                })
                .catch(function (error) {
                    console.error(
                        "Failure initializing GeoJSON layer elements within Cesium sandbox environment:",
                        error,
                    );
                });
        </script>
    </body>
</html>
