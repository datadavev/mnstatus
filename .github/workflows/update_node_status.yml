name: update_node_status

on:
  workflow_dispatch:
  schedule:
    - cron: "8 5 * * *" #Every day at 08:05 UTC

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    steps:
      - name: tStamp
        id: tnow
        run: echo NOW=$(bc <<< "scale=2; $(date +%s) / 86400 + 40587") >> $GITHUB_ENV
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "latest"
          enable-cache: true
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Update Nodes
        run: |
          mkdir -p data
          uv run mnstatus -J nids -F -s up -n mn -t ping -t mn -t cn -t index > data/node_status.json
          uv run mnstatus 2csv -o data/node_status.csv data/node_status.json
          uv run mnstatus geojson -i data/node_status.json > data/nodes.geojson
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update node_status ${{env.NOW}}
